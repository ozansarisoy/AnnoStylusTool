<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AST Mobile Controller</title>
  <!-- Load PeerJS from unpkg -->
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #2c3e50;
      color: white;
      font-family: sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    #setup {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 20px;
    }
    input {
      padding: 15px;
      font-size: 18px;
      margin-bottom: 20px;
      border-radius: 8px;
      border: none;
      width: 80%;
      text-align: center;
    }
    button.connect-btn {
      padding: 15px 30px;
      font-size: 18px;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    #main-ui {
      display: none;
      flex-direction: column;
      height: 100%;
    }
    #toolbar {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 10px;
      background: #1a252f;
      flex-wrap: wrap;
    }
    .tool-btn {
      font-size: 24px;
      padding: 10px 15px;
      background: #34495e;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }
    .tool-btn.active {
      background: #3498db;
    }
    .tool-btn.clear-btn {
      background: #e74c3c;
    }
    #touchpad {
      flex: 1;
      background-color: #34495e;
      position: relative;
    }
    .setup-desc { margin-bottom: 5px; }
    .setup-hint { font-size: 0.8em; color: #bdc3c7; margin-top: 0; margin-bottom: 20px; text-align: center; }
  </style>
</head>
<body>
  <div id="setup">
    <h2>AST Remote</h2>
    <p class="setup-desc">Enter the ID from your Chrome extension</p>
    <p class="setup-hint">
      (Click 'Generate Mobile ID' on your computer and enter the code here.)
    </p>
    <input type="text" id="peerIdInput" placeholder="e.g. ast-1234abcd">
    <button id="connectBtn" class="connect-btn">Connect</button>
    <p id="status"></p>
  </div>
  
  <div id="main-ui">
    <div id="toolbar">
      <button class="tool-btn active" data-tool="pen" title="Pen">🖊️</button>
      <button class="tool-btn" data-tool="highlight" title="Highlighter">🖍️</button>
      <button class="tool-btn" data-tool="spotlight" title="Spotlight">🔦</button>
      <button class="tool-btn" data-tool="laser" title="Laser Pointer">🔴</button>
      <button class="tool-btn" data-tool="eraser" title="Eraser">🧹</button>
      <button class="tool-btn clear-btn" data-tool="clear" title="Clear Canvas">🗑️</button>
    </div>
    <div id="touchpad"></div>
  </div>

  <script src="app.js?v=5"></script>
</body>
</html>
