<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AST Webcam Gestures</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <!-- MediaPipe Hands -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <style>
    body { font-family: sans-serif; background: #2c3e50; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    video { display: none; }
    canvas { background: #000; border-radius: 8px; margin-top: 20px; max-width: 100%; }
    .setup { display: flex; flex-direction: column; align-items: center; }
    input, button { padding: 10px; font-size: 16px; margin: 5px; border-radius: 4px; border: none; }
    button { background: #3498db; color: white; cursor: pointer; }
    #status { margin-top: 10px; color: #f1c40f; }
    .camera-wrapper { display: none; position: relative; }
  </style>
</head>
<body>
  <h2>AST Webcam Gesture Controller</h2>
  
  <div class="setup" id="setup">
    <p>1. Generate a Mobile ID from the AST Extension popup.</p>
    <p>2. Enter it below to connect.</p>
    <input type="text" id="peerIdInput" placeholder="Extension ID">
    <button id="connectBtn">Connect & Start Camera</button>
  </div>
  
  <p id="status">Waiting to connect...</p>

  <div id="camera-container" class="camera-wrapper">
    <video id="videoElement" autoplay></video>
    <canvas id="outputCanvas" width="640" height="480"></canvas>
  </div>

  <script src="app.js"></script>
</body>
</html>
