<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AST Mobile Controller</title>
  <!-- Load PeerJS from unpkg -->
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #2c3e50;
      color: white;
      font-family: sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh;
      touch-action: none; /* Prevent scrolling while drawing */
    }
    #setup {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 20px;
    }
    input {
      padding: 15px;
      font-size: 18px;
      margin-bottom: 20px;
      border-radius: 8px;
      border: none;
      width: 80%;
      text-align: center;
    }
    button {
      padding: 15px 30px;
      font-size: 18px;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    #touchpad {
      display: none;
      flex: 1;
      background-color: #34495e;
      position: relative;
    }
    .info {
      position: absolute;
      top: 10px;
      left: 0;
      width: 100%;
      text-align: center;
      pointer-events: none;
      opacity: 0.5;
    }
    .setup-desc { margin-bottom: 5px; }
    .setup-hint { font-size: 0.8em; color: #bdc3c7; margin-top: 0; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div id="setup">
    <h2>AST Remote</h2>
    <p class="setup-desc">Enter the ID from your Chrome extension</p>
    <p class="setup-hint">
      (Bilgisayarınızdaki uzantıda 'Generate Mobile ID' butonuna basarak aldığınız kodu buraya girin.)
    </p>
    <input type="text" id="peerIdInput" placeholder="e.g. 1234-abcd">
    <button id="connectBtn">Connect</button>
    <p id="status"></p>
  </div>
  
  <div id="touchpad">
    <div class="info">Draw Here</div>
  </div>

  <script src="app.js?v=3"></script>
</body>
</html>
