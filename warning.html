<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AST - Cannot Run Here</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f8f9fa; margin: 0; }
    .container { text-align: center; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; }
    h1 { color: #e74c3c; margin-top: 0; }
    p { color: #2c3e50; line-height: 1.5; }
    img { width: 64px; height: 64px; margin-bottom: 20px; }
    .btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #3498db; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; }
    .btn:hover { background: #2980b9; }
  </style>
</head>
<body>
  <div class="container">
    <img src="icons/icon48.png" alt="AST Icon">
    <h1>Cannot Run Here</h1>
    <p>Chrome prevents extensions from running on <b>chrome://</b> settings pages or blank new tabs.</p>
    <p>Please open a normal website (like Wikipedia or Google Search) to use the Anno Stylus Tool.</p>
    <a href="https://www.google.com" class="btn">Go to Google</a>
  </div>
</body>
</html>
